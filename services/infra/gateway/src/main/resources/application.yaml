spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webflux:
          # Global CORS — all routes inherit this
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:5173"   # Vite dev server
                  - "http://localhost:3000"   # Alternative frontend port
                allowed-methods: ["GET", "POST", "PUT", "PATCH", "DELETE", "OPTIONS"]
                allowed-headers: ["*"]
                allow-credentials: false
                max-age: 3600

          routes:
            - id: customer-service
              uri: ${CUSTOMER_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/v1/customers/**

            - id: account-service
              uri: ${ACCOUNT_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/v1/accounts/**

            - id: transaction-service
              uri: ${TRANSACTION_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/v1/transactions/**

            - id: rating-service
              uri: ${RATING_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/v1/ratings/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  endpoint:
    gateway:
      access: unrestricted
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true
