spring:
  application:
    name: transaction-service
  config:
    import: "optional:configserver:http://config-server:8888"
  datasource:
    url: jdbc:mysql://localhost:3307/transactions_db?serverTimezone=UTC
    username: ${DB_USER:appuser}
    password: ${DB_PASSWORD:apppassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  threads:
    virtual:
      enabled: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

account-service:
  url: ${ACCOUNT_SERVICE_URL:http://localhost:8082}

server:
  port: 8083

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      account-service:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      account-service:
        maxAttempts: 3
        waitDuration: 500ms
  timelimiter:
    instances:
      account-service:
        timeoutDuration: 3s
