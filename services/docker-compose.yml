# Docker Compose — local microservice stack
#
# USAGE
# -----
# 1. Build images (one time, or after code changes):
#      cd services\customer-service    && .\mvnw.cmd spring-boot:build-image -DskipTests
#      cd services\account-service     && .\mvnw.cmd spring-boot:build-image -DskipTests
#      cd services\transaction-service && .\mvnw.cmd spring-boot:build-image -DskipTests
#      cd services\rating-service      && .\mvnw.cmd spring-boot:build-image -DskipTests
#      cd services\infra\gateway       && .\mvnw.cmd spring-boot:build-image -DskipTests
#
# 2. Start the stack:
#      docker compose up          # foreground; Ctrl-C to stop
#      docker compose up -d       # detached; docker compose down to stop
#
# 3. Smoke test:
#      curl http://localhost:8080/actuator/health
#
# DIFFERENCES from running via start-services.ps1
# -------------------------------------------------
# - Uses its own MySQL/PostgreSQL containers (ports 3307, 5433 on host).
#   No Kubernetes port-forward required.
# - All services run inside Docker network; they reach each other by service name.
# - OTel / Grafana / Prometheus are NOT included here — start the Kubernetes
#   monitoring stack separately via startup.ps1 if you need observability.

services:

  # ---------------------------------------------------------------------------
  db:
    image: mysql:8.3
    environment:
      MYSQL_ROOT_PASSWORD: apppassword
      MYSQL_USER:          appuser
      MYSQL_PASSWORD:      apppassword
      MYSQL_DATABASE:      customers_db     # init.sql creates the other two
    volumes:
      - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"    # same port as the Kubernetes port-forward — credentials are identical
    healthcheck:
      test:         ["CMD", "mysqladmin", "ping", "-uappuser", "-papppassword"]
      interval:     5s
      timeout:      3s
      retries:      30
      start_period: 20s

  # ---------------------------------------------------------------------------
  target-db:
    image: postgres:16
    environment:
      POSTGRES_DB:       appdb
      POSTGRES_USER:     appuser
      POSTGRES_PASSWORD: apppassword
    volumes:
      - target-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"    # same port as the Kubernetes port-forward
    healthcheck:
      test:         ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval:     5s
      timeout:      3s
      retries:      30
      start_period: 10s

  # ---------------------------------------------------------------------------
  customer-service:
    image: olexiy/customer-service:0.0.1-SNAPSHOT
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/customers_db?serverTimezone=UTC
      DB_USER:               appuser
      DB_PASSWORD:           apppassword
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://host.docker.internal:4318/v1/traces
      MANAGEMENT_METRICS_TAGS_APPLICATION: customer-service
      JAVA_TOOL_OPTIONS: -Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  account-service:
    image: olexiy/account-service:0.0.1-SNAPSHOT
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL:  jdbc:mysql://db:3306/accounts_db?serverTimezone=UTC
      DB_USER:                appuser
      DB_PASSWORD:            apppassword
      CUSTOMER_SERVICE_URL:   http://customer-service:8081
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://host.docker.internal:4318/v1/traces
      MANAGEMENT_METRICS_TAGS_APPLICATION: account-service
      JAVA_TOOL_OPTIONS: -Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  transaction-service:
    image: olexiy/transaction-service:0.0.1-SNAPSHOT
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/transactions_db?serverTimezone=UTC
      DB_USER:               appuser
      DB_PASSWORD:           apppassword
      ACCOUNT_SERVICE_URL:   http://account-service:8082
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://host.docker.internal:4318/v1/traces
      MANAGEMENT_METRICS_TAGS_APPLICATION: transaction-service
      JAVA_TOOL_OPTIONS: -Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  rating-service:
    image: olexiy/rating-service:0.0.1-SNAPSHOT
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://target-db:5432/appdb
      DB_USER:               appuser
      DB_PASSWORD:           apppassword
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://host.docker.internal:4318/v1/traces
      MANAGEMENT_METRICS_TAGS_APPLICATION: rating-service
      JAVA_TOOL_OPTIONS: -Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true
    depends_on:
      target-db:
        condition: service_healthy
    restart: on-failure

  # ---------------------------------------------------------------------------
  gateway:
    image: olexiy/gateway:0.0.1-SNAPSHOT
    ports:
      - "8090:8080"
    environment:
      CUSTOMER_SERVICE_URL:    http://customer-service:8081
      ACCOUNT_SERVICE_URL:     http://account-service:8082
      TRANSACTION_SERVICE_URL: http://transaction-service:8083
      RATING_SERVICE_URL:      http://rating-service:8084
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://host.docker.internal:4318/v1/traces
      MANAGEMENT_METRICS_TAGS_APPLICATION: gateway
      JAVA_TOOL_OPTIONS: -Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true
    depends_on:
      - customer-service
      - account-service
      - transaction-service
      - rating-service
    restart: on-failure

  # ---------------------------------------------------------------------------
  accounts-viewer:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ../web/accounts-viewer:/app
      - accounts-viewer-node-modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "5174:5174"
    environment:
      GATEWAY_URL: http://gateway:8080
    depends_on:
      - gateway
    restart: on-failure

volumes:
  db-data:
  target-db-data:
  accounts-viewer-node-modules:
