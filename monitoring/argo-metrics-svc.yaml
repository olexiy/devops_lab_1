# Exposes workflow-controller metrics inside the cluster.
# workflow-controller listens on port 9090 (container port name: metrics),
# but no Service exists by default — Prometheus cannot reach it.
apiVersion: v1
kind: Service
metadata:
  name: argo-workflow-controller-metrics
  namespace: argo
  labels:
    app: workflow-controller
spec:
  clusterIP: None   # headless — we only need DNS resolution and scraping, not load balancing
  selector:
    app: workflow-controller
  ports:
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
