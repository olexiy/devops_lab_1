# Tells the Prometheus operator to scrape argo-workflow-controller-metrics.
# The label release=kube-prometheus-stack is required: the Prometheus instance
# selects ServiceMonitors by spec.serviceMonitorSelector.matchLabels.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: argo-workflow-controller-metrics
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - argo
  selector:
    matchLabels:
      app: workflow-controller
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics
      scheme: https
      tlsConfig:
        insecureSkipVerify: true   # workflow-controller uses a self-signed TLS cert
