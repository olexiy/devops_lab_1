openapi: "3.0.3"
info:
  title: Rating Service API
  description: |
    Read-only access to customer reliability ratings calculated by the nightly batch job.
    This service is the consumer of the batch output stored in PostgreSQL.
    See docs/banking-app-concept.md for the overall system context.
  version: "1.0.0"
servers:
  - url: http://localhost:8084
    description: Local development (direct)
  - url: http://localhost:8080
    description: Via API Gateway

tags:
  - name: Ratings
    description: Customer reliability ratings (read-only)

paths:

  /api/v1/ratings/{customerId}:
    get:
      tags: [Ratings]
      operationId: getRatingByCustomerId
      summary: Get rating for a specific customer
      parameters:
        - $ref: '#/components/parameters/CustomerIdPath'
      responses:
        "200":
          description: Rating found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RatingResponse'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/ratings:
    get:
      tags: [Ratings]
      operationId: listRatings
      summary: List all ratings with pagination
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/SizeParam'
      responses:
        "200":
          description: Paginated list of ratings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageRatingResponse'

components:

  parameters:
    CustomerIdPath:
      name: customerId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
    PageParam:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    NotFound:
      description: Rating not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    RatingResponse:
      type: object
      properties:
        customerId:
          type: integer
          format: int64
          example: 42
        ratingScore:
          type: number
          format: double
          description: "Reliability score 0–100; deserializes to BigDecimal via JacksonConfig"
          example: 85.0
        ratingClass:
          type: string
          example: "A"
        riskLevel:
          type: string
          example: "LOW"
        calculatedAt:
          type: string
          format: date-time
        calculationVersion:
          type: string
          example: "1.0"
        avgBalance12m:
          type: number
          format: double
          description: "Average account balance over the last 12 months"
          example: 15000.00
        productCount:
          type: integer
          example: 3
        transactionVolume12m:
          type: number
          format: double
          description: "Total transaction volume over the last 12 months"
          example: 45000.00

    PageRatingResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RatingResponse'
        page:
          $ref: '#/components/schemas/PageMetadata'

    PageMetadata:
      type: object
      properties:
        page:
          type: integer
          example: 0
        size:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 100
        totalPages:
          type: integer
          example: 5
        last:
          type: boolean
          example: false

    ErrorResponse:
      type: object
      required:
        - timestamp
        - status
        - error
        - message
        - path
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Not Found"
        message:
          type: string
          example: "Rating for customer 999 not found"
        path:
          type: string
          example: "/api/v1/ratings/999"
