# Loki values for local development
# Chart: grafana/loki 6.55.0
# Mode: SingleBinary (all Loki components in one pod)

deploymentMode: SingleBinary

loki:
  auth_enabled: false  # Disable multi-tenancy for local dev (no X-Scope-OrgID header required)
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  # Allow OTLP log ingestion from OpenTelemetry Collector
  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

singleBinary:
  replicas: 1
  persistence:
    enabled: false
  # Mount emptyDir at /var/loki so Loki can write its data
  extraVolumes:
    - name: loki-data
      emptyDir: {}
  extraVolumeMounts:
    - name: loki-data
      mountPath: /var/loki
  resources:
    requests:
      memory: 256Mi
    limits:
      memory: 1Gi

# Disable caches (use in-memory, no Memcached needed for local dev)
chunksCache:
  enabled: false
resultsCache:
  enabled: false

# Disable nginx gateway (not needed for local dev, adds complexity)
gateway:
  enabled: false

# Disable multi-component mode (not needed for single-binary)
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Disable MinIO (using local filesystem instead)
minio:
  enabled: false

# Disable self-monitoring (requires Grafana Agent operator)
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  lokiCanary:
    enabled: false

test:
  enabled: false
