# prometheus-postgres-exporter values
# Chart: prometheus-community/prometheus-postgres-exporter 7.5.2 (app v0.19.1)
# Scrapes target-db (PostgreSQL 16) in the databases namespace

config:
  datasource:
    host: target-db.databases.svc.cluster.local
    port: "5432"
    user: appuser
    password: apppassword
    database: appdb
    sslmode: disable

serviceMonitor:
  enabled: true
  labels:
    release: kube-prometheus-stack   # required — Prometheus selects ServiceMonitors by this label
  interval: 30s

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 64Mi
