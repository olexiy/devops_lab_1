# OpenTelemetry Collector values for local development
# Chart: open-telemetry/opentelemetry-collector 0.147.1
# Receives OTLP from apps and fans out to Prometheus, Loki, Tempo

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib  # contrib has loki, prometheusremotewrite exporters

resources:
  requests:
    memory: 128Mi
  limits:
    memory: 512Mi

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

  processors:
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    batch:
      send_batch_size: 512
      timeout: 5s

  exporters:
    # Traces → Tempo via OTLP gRPC
    otlp/tempo:
      endpoint: "tempo.monitoring.svc.cluster.local:4317"
      tls:
        insecure: true

    # Logs → Loki via native OTLP ingestion (Loki 3.x+)
    otlphttp/loki:
      logs_endpoint: "http://loki.monitoring.svc.cluster.local:3100/otlp/v1/logs"
      tls:
        insecure: true

    # Metrics → Prometheus via remote_write
    prometheusremotewrite:
      endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
      tls:
        insecure: true

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlp/tempo]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [otlphttp/loki]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, batch]
        exporters: [prometheusremotewrite]

# Expose OTLP ports and internal metrics port
ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
  metrics:
    enabled: true
    containerPort: 8888
    servicePort: 8888
    protocol: TCP
