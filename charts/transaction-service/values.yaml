image:
  repository: olexiy/transaction-service
  tag: "0.0.1-SNAPSHOT"
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  port: 8083
  type: ClusterIP

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

env:
  SPRING_DATASOURCE_URL: "jdbc:mysql://source-db.databases.svc.cluster.local:3306/transactions_db?serverTimezone=UTC"
  ACCOUNT_SERVICE_URL: "http://account-service.microservices.svc.cluster.local:8082"
  MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://opentelemetry-collector.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_METRICS_TAGS_APPLICATION: "transaction-service"
  JAVA_TOOL_OPTIONS: "-Dmanagement.metrics.distribution.percentiles-histogram.http.server.requests=true"

db:
  username: appuser
  password: apppassword  # DEV ONLY — replace with ExternalSecret for production
